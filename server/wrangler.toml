name = "bringme-room"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Dev: bots connect Origin-less and no extra origins are needed
# (same-host/localhost are always allowed in code).
[vars]
ALLOWED_ORIGINS = ""
ALLOW_NO_ORIGIN = "true"

# Workers Logs: structured console.* output (see src/log.ts) becomes
# queryable in the dashboard (Workers & Pages -> bringme -> Logs). Traffic is
# small, so keep every log line (head_sampling_rate 1) — dial down first if
# volume ever becomes a cost concern.
[observability]
enabled = true

[observability.logs]
head_sampling_rate = 1

# Workers Traces: automatic span instrumentation (no SDK/code changes) for the
# fetch/alarm handlers, ROOM/LOBBY DO binding calls, and DO-side storage/alarm
# ops — same dashboard tab as Logs. CAUTION: every WebSocket message is a
# hibernation invocation, so a busy 15 Hz room emits far more trace events than
# log lines, and traces SHARE the logs quota. Dev traffic is negligible, so
# sample everything here; production samples down (see env.production) — keep
# the two rates intentional, not accidentally divergent.
[observability.traces]
enabled = true
head_sampling_rate = 1

# One Durable Object per room code keeps every player in a room on the same
# instance — the DO is the authoritative game server (adapted from
# salpakan/infra/signal, upgraded from 2-seat relay to N-seat authority).
[[durable_objects.bindings]]
name = "ROOM"
class_name = "BringMeRoom"

# Single-instance public-room registry (idFromName("lobby")).
[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BringMeRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["LobbyRegistry"]

# Per-IP abuse bounds (Workers Rate Limiting binding, per-colo approximate).
# ROOM_LIMITER: websocket upgrades — reconnect backoff peaks ~6/min, so 20 is
# generous for players and stingy for floods. LOBBY_LIMITER: browse-screen
# list polls (12/min) + up to LOBBY_LIST_MAX latency pings per refresh.
[[unsafe.bindings]]
name = "ROOM_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "LOBBY_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

# Production: ONE Worker serves both the game server and the built client as
# static assets (same origin -> the page's own host is the WebSocket host, no
# CORS, no allowlist entries needed for the web build; the itch.io build IS
# cross-origin, hence ALLOWED_ORIGINS). Deploy with:
#   npm run build -w @bringme/client && npx wrangler deploy --env production
# Kept in an environment so plain `wrangler dev` never requires client/dist.
[env.production]
name = "bringme"
# Custom domains (zones live on this account): Cloudflare creates DNS records
# + certs on deploy. playbringme.com is canonical; bringme.bibin.dev and
# workers_dev stay attached so links shared before the domain existed keep
# working (page loads 301 to the canonical host — see index.ts — but /room/*
# and /lobby never redirect: WebSockets can't follow redirects and older itch
# builds have the old host baked in). Invite links in the itch build follow
# the PROD_HOST repo variable — keep it in sync with the canonical domain.
routes = [
  { pattern = "playbringme.com", custom_domain = true },
  { pattern = "www.playbringme.com", custom_domain = true },
  { pattern = "bringme.bibin.dev", custom_domain = true },
]
workers_dev = true

# The exact itch iframe origin must be confirmed on first upload (devtools →
# the WS request's Origin header) — adjusting this var is a redeploy, not a
# code change. ALLOW_NO_ORIGIN=false: browsers always send Origin; only
# non-browser tooling doesn't, and it has no business in production.
[env.production.vars]
ALLOWED_ORIGINS = "https://html-classic.itch.zone,https://html.itch.zone,*.itch.zone"
ALLOW_NO_ORIGIN = "false"
CANONICAL_HOST = "playbringme.com"

# observability is inheritable, but stated explicitly so a future top-level
# tweak can't silently change what production ships
[env.production.observability]
enabled = true

[env.production.observability.logs]
head_sampling_rate = 1

# Traces sampled to 1% in production — the sensible floor. Traces and logs
# share ONE quota, and logs (the structured `event` stream in src/log.ts) are
# the primary debugging surface; traces are the secondary latency/span view.
# 1% keeps a statistical sample for spotting patterns (slow storage calls,
# alarm latency) while costing the logs budget almost nothing. Bump temporarily
# toward 1 when actively investigating a latency issue — it's a redeploy, not a
# code change. (Any lower and you may as well set enabled = false.)
[env.production.observability.traces]
enabled = true
head_sampling_rate = 0.01

# "/" runs worker-first so page loads on non-canonical hosts can 301 to the
# canonical domain; the worker forwards canonical-host loads to this binding.
# All other asset paths still skip the worker entirely.
[env.production.assets]
directory = "../client/dist"
binding = "ASSETS"
run_worker_first = ["/room/*", "/lobby", "/"]

[[env.production.durable_objects.bindings]]
name = "ROOM"
class_name = "BringMeRoom"

[[env.production.durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyRegistry"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["BringMeRoom"]

[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["LobbyRegistry"]

[[env.production.unsafe.bindings]]
name = "ROOM_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[env.production.unsafe.bindings]]
name = "LOBBY_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

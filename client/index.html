<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bring Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #f2efe6;
        --panel: rgba(18, 20, 28, 0.82);
        --accent: #ffd23f;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #0e1016; }
      body { font-family: "Baloo 2", system-ui, "Segoe UI", sans-serif; color: var(--ink); }
      button, input { font-family: inherit; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; }

      .hud { position: fixed; pointer-events: none; z-index: 10; }

      /* banner + timer stack: timer always sits BELOW the announcement */
      #topCenter {
        position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        pointer-events: none; z-index: 10;
      }
      #banner {
        background: var(--panel); border: 3px solid var(--accent);
        border-radius: 20px; padding: 18px 40px;
        font-size: 44px; font-weight: 700; letter-spacing: 0.04em;
        display: none; text-align: center; white-space: nowrap;
      }
      #banner .swatch {
        display: inline-block; width: 32px; height: 32px; border-radius: 8px;
        margin-left: 16px; vertical-align: -4px; border: 1px solid #0008;
      }

      #toast {
        top: 45%; left: 50%; transform: translate(-50%, -50%);
        background: var(--panel); border-radius: 24px; padding: 32px 60px;
        font-size: 56px; font-weight: 800; display: none;
      }

      #timer {
        background: var(--panel); border-radius: 14px; padding: 8px 26px;
        font-size: 32px; font-weight: 700; display: none;
      }

      #scores {
        top: 16px; right: 16px; background: var(--panel);
        border-radius: 18px; padding: 20px 26px; font-size: 26px;
        min-width: 260px; display: none;
      }
      #scores .row { display: flex; justify-content: space-between; gap: 24px; line-height: 1.7; }
      #scores .row b { color: var(--accent); }

      #cooldown {
        bottom: 20px; right: 20px; background: var(--panel);
        border-radius: 14px; padding: 16px 22px; font-size: 26px; font-weight: 700;
        display: none;
      }
      #cooldown.ready { color: #7dd87d; }

      /* signal-bars latency meter, above the stun cooldown */
      #netInd {
        bottom: 88px; right: 20px; background: var(--panel);
        border-radius: 12px; padding: 12px 16px; display: none;
        align-items: flex-end; gap: 5px;
      }
      #netInd .b { width: 8px; background: #3a4154; border-radius: 2px; }
      #netInd .b:nth-child(1) { height: 10px; }
      #netInd .b:nth-child(2) { height: 17px; }
      #netInd .b:nth-child(3) { height: 24px; }
      #netInd .b:nth-child(4) { height: 31px; }
      #netInd .b.on.good { background: #7dd87d; }
      #netInd .b.on.mid { background: #ffb03f; }
      #netInd .b.on.bad { background: #ff5d5d; }
      #netInd .ms { font-size: 18px; color: #8892a8; margin-left: 8px; min-width: 62px; text-align: right; }
      #netInd.down .ms { color: #ff5d5d; }
      #netInd.down { animation: netblink 1s ease-in-out infinite; }
      @keyframes netblink { 50% { opacity: 0.45; } }

      #fsBtn {
        position: fixed; top: 16px; left: 16px; z-index: 15;
        background: var(--panel); color: var(--ink); border: 1px solid #333a4d;
        border-radius: 12px; padding: 12px 20px; font-size: 24px; font-weight: 700;
        cursor: pointer; pointer-events: auto; font-family: inherit;
        transition: border-color 0.12s ease, color 0.12s ease;
      }
      #fsBtn:hover { border-color: var(--accent); color: var(--accent); }

      #createPanel {
        bottom: 60px; left: 50%; transform: translateX(-50%);
        background: var(--panel); border: 2px solid var(--accent);
        border-radius: 12px; padding: 12px 16px; display: none;
        pointer-events: auto; width: min(480px, 92vw);
      }
      #createPanel h3 { font-size: 13px; letter-spacing: .06em; color: var(--accent); margin-bottom: 8px; }
      #createPanel .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
      #createPanel .grid button {
        background: #232736; border: 1px solid #333a4d; color: var(--ink);
        border-radius: 6px; padding: 6px 4px; font-size: 11px; cursor: pointer;
      }
      #createPanel .grid button.sel { border-color: var(--accent); color: var(--accent); }
      #createPanel label { font-size: 11px; opacity: .85; display: block; margin: 6px 0 2px; }
      #createPanel input[type=range] { width: 100%; }
      #createPanel .place {
        margin-top: 10px; width: 100%; background: var(--accent); color: #14141c;
        font-weight: 700; border: none; border-radius: 8px; padding: 9px; cursor: pointer; font-size: 14px;
      }
      #createPanel .status { font-size: 11px; color: #8892a8; margin-top: 6px; min-height: 14px; text-align: center; }

      #chargeWrap {
        bottom: 110px; left: 50%; transform: translateX(-50%);
        width: 360px; height: 24px; background: var(--panel);
        border-radius: 12px; display: none; overflow: hidden;
      }
      #charge { height: 100%; width: 0%; background: var(--accent); }

      #help {
        bottom: 20px; left: 20px; background: var(--panel);
        border-radius: 14px; padding: 16px 24px; font-size: 24px; opacity: 0.85;
        line-height: 1.6;
      }
      #help b { color: var(--accent); }

      #lobby {
        position: fixed; inset: 0; z-index: 20;
        display: none; align-items: center; justify-content: center;
        background: rgba(10, 12, 18, 0.72); backdrop-filter: blur(4px);
      }
      #lobby .panelRow {
        display: flex; gap: 28px; align-items: stretch; justify-content: center;
        flex-wrap: wrap; max-width: 96vw;
      }
      #lobby .panel {
        background: #171a24; border: 3px solid var(--accent); border-radius: 28px;
        padding: 52px 64px; width: min(700px, 94vw);
        display: flex; flex-direction: column; gap: 24px; text-align: center;
      }
      #lobby h1 { font-size: 52px; letter-spacing: 0.08em; color: var(--accent); }
      #lobby .sub { font-size: 26px; opacity: 0.8; }
      #lobby input {
        background: #0e1016; color: var(--ink); border: 1px solid #333a4d;
        border-radius: 14px; padding: 18px 24px; font-size: 30px; width: 100%;
      }
      #lobby button {
        background: var(--accent); color: #14141c; font-weight: 700;
        border: none; border-radius: 14px; padding: 20px; font-size: 30px; cursor: pointer;
        transition: transform 0.12s ease, filter 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }
      #lobby button:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
      #lobby button:active:not(:disabled) { transform: translateY(0) scale(0.97); }
      #lobby button:disabled { opacity: 0.45; cursor: default; }
      #lobby button.ghost { background: transparent; color: var(--ink); border: 1px solid #333a4d; }
      #lobby button.ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); filter: none; }
      #lobby button.ghost.copied {
        border-color: #7dd87d; color: #7dd87d;
        animation: copyPop 0.35s ease;
      }
      @keyframes copyPop {
        0% { transform: scale(1); }
        40% { transform: scale(1.07); }
        100% { transform: scale(1); }
      }
      #lobby ul { list-style: none; text-align: left; font-size: 28px; line-height: 1.9; min-height: 80px; }
      #lobby .settings { display: flex; gap: 20px; }
      #lobby .settings label { flex: 1; font-size: 22px; opacity: 0.85; text-align: left; }
      #lobby .settings input { margin-top: 8px; }
      #lobby .status { font-size: 24px; min-height: 32px; color: #8892a8; }
      #lobby .panel.scoreboard { width: min(440px, 90vw); padding: 52px 44px; gap: 18px; }
      #lobby .scoreboard h2 { font-size: 36px; letter-spacing: 0.08em; color: var(--accent); }
      #lobby .scoreboard ul { min-height: 0; }
      #lobby .scoreboard li { display: flex; align-items: baseline; gap: 14px; }
      #lobby .scoreboard .medal { width: 48px; flex: none; text-align: center; }
      #lobby .scoreboard .sname {
        flex: 1; text-align: left; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
      }
      #lobby .scoreboard .pts { font-weight: 800; color: var(--accent); }
      #lobby .scoreboard .subtle { font-size: 18px; color: #8892a8; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="lobby"></div>
    <div id="topCenter">
      <div id="banner"></div>
      <div id="timer"></div>
    </div>
    <button id="fsBtn" title="toggle fullscreen">⛶ fullscreen</button>
    <div id="toast" class="hud"></div>
    <div id="scores" class="hud"></div>
    <div id="cooldown" class="hud"></div>
    <div id="netInd" class="hud">
      <span class="b"></span><span class="b"></span><span class="b"></span><span class="b"></span>
      <span class="ms"></span>
    </div>
    <div id="createPanel" class="hud"></div>
    <div id="chargeWrap" class="hud"><div id="charge"></div></div>
    <div id="help" class="hud">
      <b>WASD</b> move &nbsp;·&nbsp; <b>Space</b> jump &nbsp;·&nbsp; <b>drag</b> orbit &nbsp;·&nbsp;
      <b>E</b> grab &nbsp;·&nbsp; <b>G</b> drop &nbsp;·&nbsp;
      <b>F</b> hold: throw &nbsp;·&nbsp; <b>Q</b> stun &nbsp;·&nbsp;
      <b>R</b> place
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

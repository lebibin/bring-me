# CI for Bring Me — check + test on every push, deploy to Cloudflare on main,
# GitHub Release on v* tags. Needs two repo secrets (see DEPLOY.md):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  deploy:
    needs: check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w @bringme/client
      - name: Deploy Worker (client assets + Durable Object)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server
          command: deploy --env production

  release:
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w @bringme/client
      - name: Zip client build
        run: cd client/dist && zip -r ../../bringme-client-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: bringme-client-*.zip

# CI for Bring Me — check + test on every push, deploy to Cloudflare on main,
# GitHub Release + itch.io channel on v* tags. Secrets (see DEPLOY.md):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, BUTLER_API_KEY
# Repo variables: PROD_HOST (e.g. bringme.acct.workers.dev), ITCH_TARGET
# (e.g. bibinqyoo/bring-me).
name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch: # ad-hoc itch push against the already-deployed Worker

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - name: World-gen safety sweep (no stuck spawns, all spawns reach the NPC)
        run: node server/test/worldcheck.mjs 200

  deploy:
    needs: check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w @bringme/client
      - name: Deploy Worker (client assets + Durable Object)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server
          command: deploy --env production

  release:
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w @bringme/client
      - name: Zip client build
        run: cd client/dist && zip -r ../../bringme-client-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: bringme-client-*.zip

  # itch.io channel: rides release tags (after the Worker deploy, so the
  # server the build expects is live) or a manual dispatch. The itch build is
  # cross-origin — it bakes in the production Worker for sockets and the
  # canonical URL for invite links (see DEPLOY.md "itch.io channel").
  itch:
    needs: deploy
    if: >-
      always() &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') &&
      (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build itch variant (relative base, cross-origin server baked in)
        run: npm run build:itch -w @bringme/client
        env:
          VITE_WS_URL: wss://${{ vars.PROD_HOST }}
          VITE_INVITE_URL: https://${{ vars.PROD_HOST }}/
      - name: Install butler
        run: |
          curl -fsSL -o butler.zip "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          unzip -q butler.zip -d butler-bin
          chmod +x butler-bin/butler
          butler-bin/butler -V
      - name: Push to itch.io (html5 channel)
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          [ "$GITHUB_REF_TYPE" = "tag" ] || VER="manual-${GITHUB_RUN_NUMBER}"
          butler-bin/butler push client/dist-itch "${{ vars.ITCH_TARGET }}:html5" --userversion "$VER"
